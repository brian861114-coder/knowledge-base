<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>材料科學與工程知識圖譜</title>
  <link rel="stylesheet" href="./styles.css">
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [["$", "$"]],
        displayMath: [["$$", "$$"]],
        processEscapes: true,
      },
      options: {
        skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"],
      },
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <h1><a href="#" class="brand-link" aria-label="回到知識圖譜首頁" data-i18n="brand.title" data-i18n-aria-label="brand.homeAria">材料科學與工程知識圖譜</a></h1>
        <p data-i18n="brand.tagline">雙語互動材料知識庫</p>
      </div>
      <nav class="topnav" aria-label="Primary">
        <button class="topnav-item" type="button" data-view="search" data-i18n="nav.search">搜尋</button>
        <button class="topnav-item" type="button" data-view="notes" data-i18n="nav.notes">筆記</button>
        <button class="topnav-item is-active" type="button" data-view="graph" data-i18n="nav.graph">圖譜</button>
        <button class="topnav-item" type="button" data-view="settings" data-i18n="nav.settings">設定</button>
      </nav>
      <button class="topbar-orbit" type="button" aria-label="View controls">+</button>
    </header>

    <main class="workspace-shell">
      <aside class="control-sidebar controls">
        <section class="sidebar-section">
          <div class="sidebar-section-head">
            <h2 data-i18n="sidebar.search.title">搜尋</h2>
            <span data-i18n="sidebar.search.kicker">Query</span>
          </div>
          <label class="search">
            <span data-i18n="sidebar.search.label">搜尋節點</span>
            <input id="searchInput" type="search" placeholder="搜尋概念、性質、製程、表徵方法…" data-i18n-placeholder="sidebar.search.placeholder">
          </label>
        </section>

        <section class="sidebar-section">
          <div class="sidebar-section-head">
            <h2 data-i18n="sidebar.mode.title">檢視模式</h2>
            <span data-i18n="sidebar.mode.kicker">Mode</span>
          </div>
          <div id="viewModeButtons" class="chips"></div>
        </section>

        <section class="sidebar-section">
          <div class="sidebar-section-head">
            <h2 id="domainSectionTitle">Taxonomy</h2>
            <button id="filterModeToggle" class="ghost-button filter-mode-toggle" type="button" title="切換分類視角" data-i18n="sidebar.filter.toggle" data-i18n-title="sidebar.filter.title">領域 / Taxonomy</button>
          </div>
          <div id="domainFilters" class="sidebar-list chips"></div>
        </section>

        <section class="sidebar-section">
          <div class="sidebar-section-head">
            <h2 data-i18n="sidebar.type.title">頁型</h2>
            <span data-i18n="sidebar.type.kicker">Type</span>
          </div>
          <div id="typeFilters" class="sidebar-list chips"></div>
        </section>

        <section class="sidebar-section sidebar-summary">
          <div class="sidebar-section-head">
            <h2 data-i18n="sidebar.atlas.title">圖譜摘要</h2>
            <span data-i18n="sidebar.atlas.kicker">Atlas</span>
          </div>
          <div class="hero-stats" id="heroStats"></div>
        </section>
      </aside>

      <section class="graph-workspace">
        <div class="graph-toolbar">
          <div class="graph-toolbar-copy">
            <h2 data-i18n="graph.title">圖譜工作區</h2>
            <p id="graphHint">總覽只保留領域樞紐、導覽頁與少量高連結節點。先選領域，再深入局部子圖。</p>
          </div>
          <div class="toolbar-actions">
            <button id="zoomOutButton" class="ghost-button" type="button" data-i18n="graph.zoomOut">縮小</button>
            <button id="zoomInButton" class="ghost-button" type="button" data-i18n="graph.zoomIn">放大</button>
            <button id="fitViewButton" class="ghost-button" type="button" data-i18n="graph.fit">適應畫面</button>
            <button id="backToOverviewToolbarButton" class="ghost-button" type="button" hidden data-i18n="graph.backToOverview">回到總覽</button>
            <button id="resetViewButton" class="ghost-button" type="button" data-i18n="graph.reset">重設視圖</button>
          </div>
        </div>

        <div id="focusBanner" class="focus-banner" hidden></div>

        <div id="domainOverview" class="domain-overview"></div>

        <section class="graph-panel">
          <div id="graphFrame" class="graph-frame">
            <canvas id="graphCanvas"></canvas>
            <div id="nodesLayer" class="nodes-layer"></div>
            <div class="graph-overlay graph-legend-panel">
              <div class="legend-heading" data-i18n="legend.title">圖例</div>
              <div class="legend">
                <span><i class="swatch type-map"></i><span data-i18n="legend.map">導覽頁</span></span>
                <span><i class="swatch type-law"></i><span data-i18n="legend.law">原理</span></span>
                <span><i class="swatch type-concept"></i><span data-i18n="legend.concept">概念</span></span>
                <span><i class="swatch type-quantity"></i><span data-i18n="legend.quantity">性質</span></span>
                <span><i class="swatch type-mathematical_tool"></i><span data-i18n="legend.characterization">表徵</span></span>
              </div>
            </div>
          </div>
        </section>
      </section>

      <aside class="detail-panel">
        <div id="detailCard" class="detail-card empty">
          <p class="detail-kicker" data-i18n="detail.empty.kicker">節點詳情</p>
          <h2 data-i18n="detail.empty.title">選取一個節點</h2>
          <p class="detail-summary" data-i18n="detail.empty.summary">右側會顯示該頁的摘要、領域、頁型，以及它在知識地圖中的前置關係與延伸方向。</p>
          <div class="detail-empty-note" data-i18n="detail.empty.note">先從總覽選一個領域，或直接點擊任一節點。</div>
        </div>
      </aside>
    </main>
  </div>

  <script src="./app.js" type="module"></script>
</body>
</html>
