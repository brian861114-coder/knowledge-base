# 筆記類型定義
# 每個 type 對應 Vault 中的一個子資料夾
# 修改此檔案即可擴充新的筆記類型

types:
  - id: concept
    label: 概念
    label_en: concept
    folder: "02_concepts"
    color: "#648356"
    description: "核心概念、定義、理論框架"

  - id: law
    label: 定律
    label_en: law
    folder: "01_laws"
    color: "#315f98"
    description: "定律、定理、反應式"

  - id: quantity
    label: 物理量
    label_en: quantity
    folder: "03_quantities"
    color: "#83589a"
    description: "可量測的物理量、化學量、生物量"

  - id: experiment
    label: 實驗
    label_en: experiment
    folder: "04_experiments"
    color: "#ae5a31"
    description: "經典實驗、量測方法、儀器"

  - id: mathematical_tool
    label: 數學工具
    label_en: mathematical_tool
    folder: "05_mathematical_tools"
    color: "#9b6b35"
    description: "數學方法在本領域中的應用"

  - id: map
    label: 導覽頁
    label_en: map
    folder: "00_maps"
    color: "#ae5a31"
    description: "領域總覽、知識地圖入口"

# 前端顯示用的 type 標籤對照
label_overrides:
  mathematical_tool: "數學工具"
