{
  "section_schemas": {
    "concept": {
      "required_order": [
        "Summary",
        "Definition",
        "Prerequisites",
        "Meaning",
        "Applications",
        "Common Misunderstandings",
        "History",
        "Modern Perspective",
        "Related Links"
      ],
      "optional": [
        "Core Formula",
        "Symbols and Units",
        "Derivation"
      ],
      "conditional_requirements": [
        {
          "if_section_present": "Core Formula",
          "require_sections": ["Symbols and Units"]
        },
        {
          "if_formula_present": true,
          "require_sections": ["Symbols and Units", "Derivation"]
        }
      ]
    },
    "principle": {
      "required_order": [
        "Summary",
        "Formal Statement",
        "Symbols and Units",
        "Meaning",
        "Derivation",
        "Applicability",
        "Applications",
        "Common Misunderstandings",
        "History",
        "Modern Perspective",
        "Related Links"
      ]
    },
    "entity": {
      "required_order": [
        "Definition",
        "Formal Representation",
        "Symbols and Units",
        "Dimensions or Attributes",
        "Meaning",
        "Observation or Measurement",
        "Used In",
        "History",
        "Modern Perspective",
        "Related Links"
      ]
    },
    "procedure": {
      "required_order": [
        "Summary",
        "Goal",
        "Inputs",
        "Derivation",
        "Steps",
        "Interpretation",
        "Failure Modes",
        "Applications",
        "History",
        "Modern Perspective",
        "Related Links"
      ],
      "optional": [
        "Formal Representation",
        "Examples"
      ]
    },
    "case_study": {
      "required_order": [
        "Summary",
        "Background",
        "Setup and Method",
        "Observations",
        "Results",
        "Limitations",
        "History",
        "Impact",
        "Modern Perspective",
        "Related Links",
        "Extensions"
      ]
    },
    "map": {
      "required_order": [
        "Summary",
        "Main Themes",
        "Key Concepts",
        "Key Principles",
        "Typical Questions",
        "Recommended Learning Order",
        "Prerequisites",
        "Bridges to Other Areas",
        "Next Directions"
      ],
      "optional": [
        "Key Case Studies"
      ],
      "ordering_rules": [
        {
          "optional_sections_must_not_break_required_order": true
        },
        {
          "optional_section_positions": {
            "Key Case Studies": {
              "allowed": [
                {
                  "after": "Key Principles"
                }
              ],
              "fixed_position": true
            }
          }
        }
      ]
    }
  }
}
