<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>普通物理知識地圖原型</title>
  <link rel="stylesheet" href="./styles.css">
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [["$", "$"]],
        displayMath: [["$$", "$$"]],
        processEscapes: true,
      },
      options: {
        skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"],
      },
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body>
  <div class="shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Physics Atlas Prototype</p>
        <h1>普通物理知識地圖</h1>
        <p class="lede">
          直接讀取 Obsidian 匯出的 graph 資料，將定律、概念、物理量、數學工具與導覽頁串成一張可探索的互動地圖。
        </p>
      </div>
      <div class="hero-stats" id="heroStats"></div>
    </header>

    <section class="controls">
      <label class="search">
        <span>搜尋節點</span>
        <input id="searchInput" type="search" placeholder="例如：牛頓第二定律、電場、向量">
      </label>

      <div class="view-controls">
        <div class="filter-title">瀏覽模式</div>
        <div id="viewModeButtons" class="chips"></div>
      </div>

      <div id="focusBanner" class="focus-banner" hidden></div>

      <div class="filter-group">
        <div class="filter-title">領域</div>
        <div id="domainFilters" class="chips"></div>
      </div>

      <div class="filter-group">
        <div class="filter-title">頁型</div>
        <div id="typeFilters" class="chips"></div>
      </div>
    </section>

    <main class="workspace">
      <section class="graph-panel">
        <div class="graph-toolbar">
          <div>
            <h2>知識地圖</h2>
            <p id="graphHint">點選節點查看摘要與關聯。拖曳節點可重新整理局部布局。</p>
          </div>
          <div class="toolbar-actions">
            <button id="zoomOutButton" class="ghost-button" type="button">縮小</button>
            <button id="zoomInButton" class="ghost-button" type="button">放大</button>
            <button id="fitViewButton" class="ghost-button" type="button">置中</button>
            <button id="backToOverviewToolbarButton" class="ghost-button" type="button" hidden>返回總覽</button>
            <button id="resetViewButton" class="ghost-button" type="button">重置視圖</button>
          </div>
        </div>
        <div id="domainOverview" class="domain-overview"></div>
        <div id="graphFrame" class="graph-frame">
          <canvas id="graphCanvas"></canvas>
          <div id="nodesLayer" class="nodes-layer"></div>
        </div>
        <div class="legend">
          <span><i class="swatch type-map"></i>導覽頁</span>
          <span><i class="swatch type-law"></i>定律</span>
          <span><i class="swatch type-concept"></i>概念</span>
          <span><i class="swatch type-quantity"></i>物理量</span>
          <span><i class="swatch type-mathematical_tool"></i>數學工具</span>
        </div>
      </section>

      <aside class="detail-panel">
        <div id="detailCard" class="detail-card empty">
          <p class="detail-kicker">Node Detail</p>
          <h2>選取一個節點</h2>
          <p>
            右側會顯示該頁面的摘要、領域、頁型，以及它在這張物理知識地圖中的前置關係與延伸方向。
          </p>
        </div>
      </aside>
    </main>
  </div>

  <script src="./app.js" type="module"></script>
</body>
</html>
