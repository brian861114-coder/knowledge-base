{
  "content_rules": {
    "global": {
      "banned_patterns": ["不是A而是B"],
      "principles": [
        "摘要必須先定義，再談用途",
        "不得用否定句型取代直接定義",
        "所有 section 必須有實質內容，不得留空殼模板"
      ]
    },
    "concept": {
      "required_semantics": [
        "物理意義必須說明此概念描述什麼、為何重要、如何理解、常見誤解在哪裡",
        "若有公式，必須有符號與單位",
        "若有公式，推導不可只有結論，至少要有推導鏈",
        "若無公式，可不寫推導",
        "歷史背景除人名、年份、實驗外，也應說明概念形成的問題背景、提出動機或分類理由",
        "現代理論視角必須說明此概念在現代物理中的延伸、重解釋或更一般框架"
      ]
    },
    "law": {
      "required_semantics": [
        "物理意義必須說明此定律描述的機制、限制與解釋力",
        "數學表述若含變數，必須有符號與單位",
        "推導不可只有公式重述",
        "適用條件必須明確寫出假設、近似或限制",
        "歷史背景必須具體，包含人名、年份或實驗",
        "現代理論視角必須說明此定律在現代理論中的地位、修正或極限"
      ]
    },
    "quantity": {
      "required_semantics": [
        "符號與單位必須列出常用符號與 SI 單位",
        "若公式含其他變數，應補充其符號與單位",
        "維度與量綱必須列出量綱表示，不可用單位資訊取代",
        "物理意義必須說明這個量反映什麼物理狀態、作用或效果",
        "量測方式不可空泛，至少指出實驗或儀器層級的方法",
        "現代理論視角應說明此量在更一般理論中的角色、重解釋或延伸"
      ]
    },
    "mathematical_tool": {
      "required_semantics": [
        "不可只有數學定義，必須回答物理為什麼需要它",
        "推導 section 必須存在，且不可只有公式列舉",
        "必須包含典型操作與解題框架",
        "現代理論視角應說明此工具在更高階理論、抽象框架或現代方法中的位置"
      ]
    },
    "experiment": {
      "required_semantics": [
        "裝置與方法必須具體，不可只寫抽象目的",
        "可觀測量必須明確",
        "誤差與限制不可省略",
        "歷史影響需說明對理論或後續研究的作用",
        "現代理論視角應說明此實驗在今日理論、技術或方法論中的地位"
      ]
    },
    "map": {
      "required_semantics": [
        "不得只是 link list",
        "每個主題區塊必須解釋節點之間的關係",
        "建議學習順序需具方向性，不可只有名稱羅列",
        "關鍵實驗若出現，只能固定放在關鍵定律之後"
      ]
    }
  },
  "audit_thresholds": {
    "meaning_min_chars": 100,
    "derivation_min_chars": 80,
    "require_latex_in_derivation": true,
    "require_people_or_year_in_history": true,
    "require_symbol_section_if_formula_present": true,
    "require_grouped_related_links": true
  }
}
